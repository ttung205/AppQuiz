<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quiz Học Tập</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="container">
    <h1 class="main-title">Quiz Học Tập</h1>

    <!-- MENU CHỌN MÔN HỌC -->
    <div id="subject-menu" class="subject-menu">
      <h2 class="subtitle">Chọn môn học để bắt đầu kiểm tra</h2>
      <div class="subject-grid">
        <button class="subject-btn" data-subject="DTDM">
          <span class="subject-icon">☁️</span>
          <span class="subject-name">Điện toán đám mây</span>
        </button>
        <button class="subject-btn" data-subject="ATTT">
          <span class="subject-icon">🔒</span>
          <span class="subject-name">An toàn thông tin</span>
        </button>
        <button class="subject-btn" data-subject="KTPM">
          <span class="subject-icon">⚙️</span>
          <span class="subject-name">Kĩ thuật phần mềm</span>
        </button>
        <button class="subject-btn" data-subject="PLDC">
          <span class="subject-icon">📱</span>
          <span class="subject-name">Pháp luật đại cương</span>
        </button>
        <button class="subject-btn" data-subject="Webnc">
          <span class="subject-icon">🌐</span>
          <span class="subject-name">Web nâng cao</span>
        </button>
        <button class="subject-btn" data-subject="Hoa">
          <span class="subject-icon">🧪</span>
          <span class="subject-name">Hóa học</span>
        </button>
        <button class="subject-btn" data-subject="Duoc">
          <span class="subject-icon">💊</span>
          <span class="subject-name">Dược học</span>
        </button>
      </div>
    </div>

    <!-- MENU CHỌN PHẦN QUIZ -->
    <div id="main-menu" class="menu hidden">
      <button id="back-to-subject" class="back-btn">← Quay lại</button>
      <h2 class="subtitle" id="current-subject-title"></h2>
      <!-- Nút phần sẽ được tạo động theo số lượng câu hỏi của môn -->
    </div>

    <!-- QUIZ VIEW -->
    <div id="quiz-view" class="quiz-view hidden">
      <div class="quiz-header">
        <span id="quiz-part"></span>
        <span id="quiz-progress"></span>
      </div>
      <div id="question-content"></div>
      <ul id="options-list"></ul>
      <div id="answer-feedback" class="answer-feedback"></div>
      <div class="quiz-nav">
        <button id="prev-btn" class="nav-btn">Câu Trước</button>
        <button id="next-btn" class="nav-btn">Câu Tiếp Theo</button>
      </div>
      <div class="quiz-actions">
        <button id="restart-btn" class="nav-btn">Bắt đầu lại</button>
        <button id="quiz-back-btn" class="back-btn">Quay lại chọn phần</button>
      </div>
    </div>

    <!-- RESULT VIEW -->
    <div id="result-view" class="result-view hidden">
      <h2>Kết Quả</h2>
      <div id="result-summary"></div>
      <button id="back-btn" class="back-btn">Quay lại chọn phần</button>
    </div>
  </div>

  <!-- Load tất cả file dữ liệu môn học -->
  <script>
    // Object chứa dữ liệu tất cả các môn
    window.allSubjectsData = {};
    // Biến tạm để lưu data từ các file
    var questionsData;
  </script>

  <script src="DTDM.js"></script>
  <script>if (questionsData) { allSubjectsData.DTDM = [...questionsData]; }</script>

  <script src="ATTT.js"></script>
  <script>if (questionsData) { allSubjectsData.ATTT = [...questionsData]; }</script>

  <script src="KTPM.js"></script>
  <script>if (questionsData) { allSubjectsData.KTPM = [...questionsData]; }</script>

  <script src="PLDC.js"></script>
  <script>if (questionsData) { allSubjectsData.PLDC = [...questionsData]; }</script>

  <script src="Webnc.js"></script>
  <script>if (questionsData) { allSubjectsData.Webnc = [...questionsData]; }</script>

  <script src="Hoa.js"></script>
  <script>if (questionsData) { allSubjectsData.Hoa = [...questionsData]; }</script>

  <script src="Duoc.js"></script>
  <script>if (questionsData) { allSubjectsData.Duoc = [...questionsData]; }</script>

  <script src="quiz-app.js"></script>
</body>

</html>
